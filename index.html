<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Mitra MyRobin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // URL APPS SCRIPT ANDA
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrm22AnHO3UnA7IL-ypyfp-dAxSLrjT_wZ8NjUBezV2jBBkLZN0gbL-5op6HJna33j/exec";

        function App() {
            const [loading, setLoading] = useState(false);
            const [success, setSuccess] = useState(false);
            const [error, setError] = useState("");
            
            const [form, setForm] = useState({
                nama: "", id: "", hub: "", posisi: "Mitra", type: "Rider",
                provinsi: "", alamat: "", nik: "", whatsapp: "", email: "", jenisKelamin: "Laki-laki"
            });

            const [files, setFiles] = useState({ sim: null, ktp: null });

            useEffect(() => {
                lucide.createIcons();
            }, [success]);

            const handleChange = (e) => {
                setForm({ ...form, [e.target.name]: e.target.value });
            };

            const handleFile = (e, key) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 2 * 1024 * 1024) {
                        alert("Ukuran file maksimal 2MB!");
                        return;
                    }
                    setFiles({ ...files, [key]: file });
                }
            };

            const toBase64 = (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!files.sim || !files.ktp) {
                    setError("Harap unggah foto SIM dan KTP Anda.");
                    return;
                }

                setLoading(true);
                setError("");

                try {
                    const simBase64 = await toBase64(files.sim);
                    const ktpBase64 = await toBase64(files.ktp);

                    const payload = {
                        ...form,
                        simBase64, simType: files.sim.type,
                        ktpBase64, ktpType: files.ktp.type
                    };

                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });

                    setSuccess(true);
                } catch (err) {
                    setError("Gagal mengirim data. Silakan coba lagi.");
                } finally {
                    setLoading(false);
                }
            };

            if (success) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6">
                        <div className="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 text-center border border-blue-100">
                            <div className="bg-green-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-green-600">
                                <i data-lucide="check-circle-2" style={{width: 48, height: 48}}></i>
                            </div>
                            <h2 className="text-2xl font-bold text-slate-800 mb-3">Verifikasi Terkirim!</h2>
                            <p className="text-slate-500 mb-8 leading-relaxed">
                                Data berhasil dikirim ke Spreadsheet. Cek email <b>{form.email}</b> untuk konfirmasi otomatis.
                            </p>
                            <button onClick={() => window.location.reload()} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg">
                                Kembali ke Beranda
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen py-10 px-4">
                    <div className="max-w-4xl mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
                        <div className="bg-blue-600 px-8 py-10 text-white relative">
                            <h1 className="text-3xl font-black tracking-tight mb-1 uppercase">MYROBIN</h1>
                            <p className="text-blue-100 font-medium">Formulir Verifikasi Kemitraan</p>
                        </div>

                        <form onSubmit={handleSubmit} className="p-8 lg:p-12 space-y-10">
                            {error && <div className="p-4 bg-red-50 text-red-600 rounded-2xl font-bold animate-shake">⚠️ {error}</div>}

                            <div className="space-y-6">
                                <h3 className="text-lg font-bold text-slate-700 border-b pb-2 flex items-center gap-2">
                                    <i data-lucide="user" class="w-5 h-5"></i> Data Identitas
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">Nama Lengkap</label>
                                        <input required name="nama" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">ID Mitra</label>
                                        <input required name="id" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">NIK (KTP)</label>
                                        <input required name="nik" maxLength="16" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">Jenis Kelamin</label>
                                        <select name="jenisKelamin" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition cursor-pointer">
                                            <option>Laki-laki</option>
                                            <option>Perempuan</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <h3 className="text-lg font-bold text-slate-700 border-b pb-2 flex items-center gap-2">
                                    <i data-lucide="briefcase" class="w-5 h-5"></i> Penempatan & Kategori
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">Posisi</label>
                                        <select name="posisi" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                                            <option>Mitra</option>
                                            <option>Mitra Plus</option>
                                            <option>Dedicated</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">Type</label>
                                        <select name="type" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                                            <option>Rider</option>
                                            <option>Driver</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">Hub</label>
                                        <input required name="hub" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">Provinsi</label>
                                        <input required name="provinsi" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" />
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-xs font-bold text-slate-500 ml-1">Alamat Lengkap</label>
                                    <textarea required name="alamat" rows="2" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <h3 className="text-lg font-bold text-slate-700 border-b pb-2 flex items-center gap-2">
                                    <i data-lucide="phone" class="w-5 h-5"></i> Kontak Aktif
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">WhatsApp</label>
                                        <input required type="tel" name="whatsapp" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="08xxxx" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-xs font-bold text-slate-500 ml-1">Email</label>
                                        <input required type="email" name="email" onChange={handleChange} className="w-full px-5 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" placeholder="anda@email.com" />
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <h3 className="text-lg font-bold text-slate-700 border-b pb-2 flex items-center gap-2">
                                    <i data-lucide="upload" class="w-5 h-5"></i> Dokumen
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="p-6 border-2 border-dashed rounded-2xl text-center space-y-2 relative transition hover:border-blue-400">
                                        <input type="file" accept="image/*" onChange={(e) => handleFile(e, 'sim')} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        <p className="font-bold text-slate-700">{files.sim ? "SIM Terpilih ✅" : "Pilih Foto SIM"}</p>
                                        <p className="text-[10px] text-slate-400">{files.sim ? files.sim.name : "Format JPG/PNG"}</p>
                                    </div>
                                    <div className="p-6 border-2 border-dashed rounded-2xl text-center space-y-2 relative transition hover:border-blue-400">
                                        <input type="file" accept="image/*" onChange={(e) => handleFile(e, 'ktp')} className="absolute inset-0 opacity-0 cursor-pointer" />
                                        <p className="font-bold text-slate-700">{files.ktp ? "KTP Terpilih ✅" : "Pilih Foto KTP"}</p>
                                        <p className="text-[10px] text-slate-400">{files.ktp ? files.ktp.name : "Format JPG/PNG"}</p>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" disabled={loading} className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-xl hover:bg-blue-700 active:scale-95 transition-all shadow-xl shadow-blue-100 flex items-center justify-center gap-3">
                                {loading ? (
                                    <>
                                        <div className="w-6 h-6 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
                                        <span>MENGIRIM...</span>
                                    </>
                                ) : "KIRIM VERIFIKASI"}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize icons
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
